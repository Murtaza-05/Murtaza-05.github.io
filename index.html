<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAZ Studio | Profesyonel Tasarım Şablonları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">PAZ Studio</div>
            <ul class="nav-links">
                <li><a href="#ana-sayfa">Ana Sayfa</a></li>
                <li><a href="#sablonlar">Şablonlar</a></li>
                <li><a href="#iletisim">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <section id="ana-sayfa" class="hero">
        <div class="hero-content">
            <h1>Yaratıcı Projelerin İçin Dijital Şablonlar</h1>
            <p>Tasarımlarına hız kat, profesyonel kalitedeki şablonlarımızı keşfet.</p>
            <a href="https://www.etsy.com/shop/..." class="cta-button" target="_blank">Mağazayı Ziyaret Et</a>
        </div>
    </section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    // Yeni bir zaman çizelgesi (timeline) oluşturuyoruz
    const tl = gsap.timeline();

    // 1. Üst Menü (Header) yukarıdan aşağıya yumuşakça insin
    tl.from("header", {
        y: -100,           // Y ekseninde -100 pikselden başla
        opacity: 0,        // Tamamen şeffaf başla
        duration: 1,       // Animasyon 1 saniye sürsün
        ease: "power3.out" // Hızlı başlayıp sonlara doğru yavaşlayarak otursun
    })
    // 2. Logo ve Menü linkleri sırayla belirtsin (Stagger efekti)
    .from(".logo, .nav-links li", {
        y: -20,
        opacity: 0,
        duration: 0.8,
        stagger: 0.1,      // Her bir element 0.1 saniye arayla gelsin
        ease: "power2.out"
    }, "-=0.5")            // Bir önceki animasyon bitmeden 0.5 saniye önce başla (Geçişleri kaynaştır)
    
    // 3. Karşılama Alanı (Hero) yazıları ve buton aşağıdan süzülsün
    .from(".hero-content h1, .hero-content p, .cta-button", {
        y: 50,
        opacity: 0,
        duration: 1,
        stagger: 0.2,
        ease: "power3.out"
    }, "-=0.5");
</script>
</body>
</html>
